name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  # ── Job 1: Build React frontend ───────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json
      - run: cd web/frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/frontend/dist/

  # ── Job 2: Build binaries (matrix) ────────────────────────────────────────
  build:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            web: false
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            web: false
          - goos: darwin
            goarch: arm64
            suffix: web-darwin-arm64
            web: true
          - goos: darwin
            goarch: amd64
            suffix: web-darwin-amd64
            web: true
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            web: false
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            web: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: actions/download-artifact@v4
        if: matrix.web == true
        with:
          name: frontend-dist
          path: web/frontend/dist/
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME#v}"  # strip leading 'v' (v2.0.0 → 2.0.0)
          TAGS=""
          if [ "${{ matrix.web }}" = "true" ]; then TAGS="-tags web"; fi
          go build $TAGS \
            -ldflags "-X github.com/emusal/alogin2/internal/cli.Version=${VERSION} -s -w" \
            -o alogin-${{ matrix.suffix }} \
            ./cmd/alogin
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: alogin-${{ matrix.suffix }}

  # ── Job 3: Create GitHub Release ──────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - name: Generate checksums
        run: shasum -a 256 alogin-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            alogin-*
            checksums.txt
          generate_release_notes: true
