name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  # ── Job 1: Build React frontend ───────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json
      - run: cd web/frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/frontend/dist/

  # ── Job 2: Build binaries (matrix) ────────────────────────────────────────
  build:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            web: false
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            web: false
          - goos: darwin
            goarch: arm64
            suffix: web-darwin-arm64
            web: true
          - goos: darwin
            goarch: amd64
            suffix: web-darwin-amd64
            web: true
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            web: false
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            web: false
          - goos: linux
            goarch: amd64
            suffix: web-linux-amd64
            web: true
          - goos: linux
            goarch: arm64
            suffix: web-linux-arm64
            web: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: actions/download-artifact@v4
        if: matrix.web == true
        with:
          name: frontend-dist
          path: web/frontend/dist/
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME#v}"  # strip leading 'v' (v2.0.0 → 2.0.0)
          TAGS=""
          if [ "${{ matrix.web }}" = "true" ]; then TAGS="-tags web"; fi
          go build $TAGS \
            -ldflags "-X github.com/emusal/alogin2/internal/cli.Version=${VERSION} -s -w" \
            -o alogin-${{ matrix.suffix }} \
            ./cmd/alogin
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: alogin-${{ matrix.suffix }}

  # ── Job 3: Create GitHub Release ──────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - name: Generate checksums
        run: shasum -a 256 alogin-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            alogin-*
            checksums.txt
          generate_release_notes: true

  # ── Job 4: Update Homebrew tap ────────────────────────────────────────────
  # Requires a repo secret HOMEBREW_TAP_TOKEN:
  #   GitHub → Settings → Secrets → Actions → New repository secret
  #   Value: a PAT (classic) with repo scope on emusal/homebrew-alogin
  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - name: Generate checksums
        run: shasum -a 256 alogin-* > checksums.txt
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: emusal/homebrew-alogin
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-alogin
      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_DARWIN_ARM64=$(grep 'alogin-web-darwin-arm64' checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep 'alogin-web-darwin-amd64' checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep  'alogin-web-linux-arm64'  checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep  'alogin-web-linux-amd64'  checksums.txt | awk '{print $1}')

          mkdir -p homebrew-alogin/Formula
          cat > homebrew-alogin/Formula/alogin.rb << FORMULA
          class Alogin < Formula
            desc "Modern SSH connection manager with encrypted credential vault"
            homepage "https://github.com/emusal/alogin2"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/emusal/alogin2/releases/download/v${VERSION}/alogin-web-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/emusal/alogin2/releases/download/v${VERSION}/alogin-web-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/emusal/alogin2/releases/download/v${VERSION}/alogin-web-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/emusal/alogin2/releases/download/v${VERSION}/alogin-web-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install Dir["alogin-web-*"].first => "alogin"
            end

            def caveats
              <<~EOS
                To set up shell completions, run:
                  alogin completion install            # zsh (default)
                  alogin completion install --shell bash
              EOS
            end

            test do
              assert_match "alogin v${VERSION}", shell_output("#{bin}/alogin version")
            end
          end
          FORMULA
      - name: Commit and push formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd homebrew-alogin
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/alogin.rb
          git commit -m "alogin v${VERSION}"
          git push
