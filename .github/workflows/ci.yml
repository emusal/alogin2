name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)" || (echo "gofmt issues in:"; gofmt -l .; exit 1)
