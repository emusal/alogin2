version: '3.8'

services:
  bastion:
    build:
      context: ./docker/ubuntu
      args:
        BASE_IMAGE: ubuntu:22.04
    container_name: alogin_bastion
    hostname: bastion
    ports:
      - "2222:22"
    networks:
      - front_net
      - back_net
    restart: always

  target-ubuntu:
    build:
      context: ./docker/ubuntu
      args:
        BASE_IMAGE: ubuntu:24.04
    container_name: alogin_target_ubuntu
    hostname: target-ubuntu
    networks:
      - back_net
    restart: always

  target-alpine:
    build:
      context: ./docker/alpine
    container_name: alogin_target_alpine
    hostname: target-alpine
    networks:
      - back_net
    restart: always

  target-centos7:
    platform: linux/amd64
    build:
      context: ./docker/centos7
    container_name: alogin_target_centos7
    hostname: target-centos7
    networks:
      - back_net
    restart: always

  target-centos6:
    platform: linux/amd64
    build:
      context: ./docker/centos6
    container_name: alogin_target_centos6
    hostname: target-centos6
    networks:
      - back_net
    restart: always

  target-legacy-rsa:
    build:
      context: ./docker/legacy-rsa
    container_name: alogin_target_legacy_rsa
    hostname: target-legacy-rsa
    networks:
      - back_net
    restart: always

  # ── Plugin System Test Services ───────────────────────────────────────────
  # target-mariadb: SSH target that runs a MariaDB server.
  # Used for testing the mariadb plugin (--app mariadb).
  target-mariadb:
    build:
      context: ./docker/mariadb
    container_name: alogin_target_mariadb
    hostname: target-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: testuser
      MARIADB_DATABASE: testdb
    networks:
      - back_net
    restart: always

  # target-redis: SSH target that runs a Redis server.
  # Used for testing the redis plugin (--app redis).
  target-redis:
    build:
      context: ./docker/redis
    container_name: alogin_target_redis
    hostname: target-redis
    environment:
      REDIS_PASSWORD: testuser
    networks:
      - back_net
    restart: always

  # target-postgres: SSH target that runs a PostgreSQL server.
  # Used for testing the postgres plugin (--app postgres).
  target-postgres:
    build:
      context: ./docker/postgres
    container_name: alogin_target_postgres
    hostname: target-postgres
    environment:
      POSTGRES_PASSWORD: testuser
      POSTGRES_DB: testdb
    networks:
      - back_net
    restart: always

  # target-mongo: SSH target that runs a MongoDB server.
  # Used for testing the mongo plugin (--app mongo).
  target-mongo:
    build:
      context: ./docker/mongo
    container_name: alogin_target_mongo
    hostname: target-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: testuser
    networks:
      - back_net
    restart: always

networks:
  front_net:
  back_net:
    internal: true
